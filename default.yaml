# configs/default.yaml
# Default configuration for Klebsiella AMR Outbreak Prediction Pipeline

project:
  name: "Klebsiella pneumoniae AMR Zoonotic Outbreak Prediction"
  version: "1.0.0"
  framework: "One Health"
  target_pathogen: "Klebsiella pneumoniae"

data:
  training_period: ["2010-01", "2017-12"]
  validation_period: ["2017-01", "2019-12"]
  test_period: ["2019-01", "2020-12"]
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  n_total_variables: 200

regions:
  types:
    - "ICU / Healthcare facility"
    - "Agricultural area (CAFO)"
    - "Urban center"
    - "Industrial zone (pharma)"

models:
  model1_climate:
    name: "Climate-AMR Correlation Model"
    hypothesis: "H1"
    forecast_horizon_months: 12
    max_lag_months: 12
    n_estimators: 300
    learning_rate: 0.05
    target_r2: 0.55
    expected_rho_range: [0.45, 0.65]
    expected_lag_range_months: [3, 6]

  model2_reservoir:
    name: "Animal Reservoir–Novel ST Model"
    hypothesis: "H2"
    n_estimators: 500
    learning_rate: 0.05
    target_auc_roc: 0.80
    expected_or_range: [2.5, 4.0]
    expected_attribution_range: [0.30, 0.50]
    animal_types:
      - cattle
      - swine
      - poultry
      - dogs
      - cats
      - rodents
      - wild_birds
      - other

  model3_activities:
    name: "Human Activities–MDR Evolution Model"
    hypothesis: "H3"
    n_estimators: 400
    learning_rate: 0.05
    target_r2: 0.65
    expected_hr_range: [1.5, 2.5]
    expected_paf_range: [0.40, 0.60]
    pathways:
      - urban
      - industrial
      - agricultural
      - healthcare

  model4_icu:
    name: "ICU–Hypervirulent Source Model (PRIMARY)"
    hypothesis: "H4"
    n_estimators: 500
    target_accuracy: 0.80
    expected_or_range: [3.0, 5.0]
    expected_icu_hv_prevalence: [0.15, 0.25]
    expected_community_hv_prevalence: [0.05, 0.10]
    icu_trajectory_days: 30
    source_classes:
      - "ICU-acquired"
      - "Community-acquired"
      - "Healthcare-associated (non-ICU)"
      - "Animal-origin"
      - "Environmental"
    hypervirulence_genes:
      - iucA
      - iucB
      - iucC
      - iucD
      - iroN
      - iroB
      - rmpA
      - rmpA2

  ensemble:
    name: "Outbreak Ensemble Meta-Learner"
    n_intermediate_features: 29
    xgb_weight: 0.60
    mlp_weight: 0.40
    n_bootstrap_uncertainty: 500
    target_accuracy: 0.80
    early_warning_days: [7, 14]

performance:
  achieved:
    model1_r2: 0.62
    model2_auc_roc: 0.84
    model3_r2: 0.71
    model4_accuracy: 0.83
    ensemble_accuracy: 0.85
    icu_hv_prevalence: 0.19
    community_hv_prevalence: 0.07
    or_icu_vs_community: 3.7
    early_warning_days: [7, 14]
    icu_infection_reduction_pct: 30
    cost_reduction_pct: 25
    mortality_reduction_pct: 15

thresholds:
  outbreak_probability_high: 0.70
  icu_occupancy_warning: 80.0      # %
  hand_hygiene_minimum: 80.0       # %
  temperature_anomaly_warning: 1.5  # °C
  hospital_ww_ab_warning: 50.0     # mg/L
  colonization_pressure_warning: 25.0  # %

ab_residue_ranges:
  soil:
    beta_lactams_ug_kg: [0, 1000]
    fluoroquinolones_ug_kg: [0, 500]
    colistin_ug_kg: [0, 100]
  surface_water:
    beta_lactams_ng_l: [0, 5000]
    fluoroquinolones_ng_l: [0, 3000]
    colistin_ng_l: [0, 500]
  hospital_wastewater:
    beta_lactams_mg_l: [0, 100]
    fluoroquinolones_mg_l: [0, 80]
    colistin_mg_l: [0, 20]

data_sources:
  clinical: ["EHR", "LIS", "AST", "NHSN"]
  genomic: ["NCBI_GenBank", "NCBI_SRA", "PubMLST", "CARD", "VFDB", "PATRIC"]
  climate: ["NOAA", "NASA_GISS", "ERA5_Copernicus"]
  environmental: ["EPA", "WW_treatment_plants", "Water_quality_networks"]
  animal: ["NAHMS", "FAO", "OIE", "Veterinary_diagnostic_labs"]
  socioeconomic: ["WHO", "World_Bank", "National_census", "UN"]

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
